<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NextHire</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --neon-blue: #00bfff;
            --white: #ffffff;
            --border-glow: rgba(0, 191, 255, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            padding: 20px;
        }
        
        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.2s;
            box-shadow: 0 0 20px var(--neon-blue);
        }
        
        #cursor.hover {
            transform: scale(2);
            background: rgba(0, 191, 255, 0.2);
        }
        
        /* Login Container */
        .login-container {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 191, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), transparent, var(--neon-blue));
            border-radius: 20px;
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 30px var(--neon-blue);
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .subtitle {
            opacity: 0.8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--neon-blue);
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
        }
        
        .btn-login {
            width: 100%;
            padding: 1.2rem;
            background: var(--neon-blue);
            color: var(--bg-dark);
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px var(--neon-blue);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px var(--neon-blue);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .divider {
            margin: 2rem 0;
            position: relative;
            text-align: center;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-glow);
        }
        
        .divider span {
            background: var(--bg-card);
            padding: 0 1rem;
            opacity: 0.6;
            position: relative;
        }
        
        .register-link {
            color: var(--neon-blue);
            text-decoration: none;
            transition: opacity 0.3s;
        }
        
        .register-link:hover {
            opacity: 0.8;
        }
        
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--white);
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
            z-index: 100;
        }
        
        .back-link:hover {
            color: var(--neon-blue);
        }
        
        /* Particles Background */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #6ee7b7;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 2rem;
            }
            
            .logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div id="cursor"></div>
    
    <!-- Particles Background -->
    <canvas id="particles"></canvas>
    
    <!-- Back Link -->
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
    </a>
    
    <!-- Login Container -->
    <div class="login-container">
        <div class="logo">NEXTHIRE</div>
        <p class="subtitle">Acede à tua conta</p>
        
        <div id="alert" class="alert"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Palavra-passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>
        
        <div class="divider">
            <span>ou</span>
        </div>
        
        <p>Não tens conta? <a href="register-immersive.html" class="register-link">Criar conta</a></p>
    </div>
    
    <script src="auth.js"></script>
    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        
        document.querySelectorAll('a, button, input').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
        
        // Particles Background
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2,
                size: Math.random() * 1 + 0.5
            });
        }
        
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 191, 255, 0.3)';
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
            
            requestAnimationFrame(drawParticles);
        }
        drawParticles();
        
        // Form Animation
        gsap.from('.login-container', {
            opacity: 0,
            y: 50,
            duration: 1,
            ease: 'power2.out'
        });
        
        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const alert = document.getElementById('alert');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            
            setTimeout(() => {
                const result = login(email, password);
                
                if (result.success) {
                    alert.className = 'alert alert-success';
                    alert.textContent = '✓ Login realizado com sucesso!';
                    alert.style.display = 'block';
                    
                    gsap.to('body', {
                        opacity: 0,
                        duration: 0.5,
                        onComplete: () => {
                            window.location.href = 'nexthire-wizard.html';
                        }
                    });
                } else {
                    alert.className = 'alert alert-error';
                    alert.textContent = '✗ ' + result.message;
                    alert.style.display = 'block';
                    
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                    
                    // Shake animation on error
                    gsap.to('.login-container', {
                        x: -10,
                        duration: 0.1,
                        yoyo: true,
                        repeat: 5,
                        ease: 'power2.inOut'
                    });
                }
            }, 800);
        });
        
        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Verificar se já está logado
        if (getCurrentUser()) {
            window.location.href = 'nexthire-wizard.html';
        }
    </script>
    
    <!-- Partículas Interativas -->
    <script src="particles-interactive.js"></script>
</body>
</html>
