<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextHire - Sistema Completo de Currículos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #00D9FF;
            --primary-dark: #00B8D4;
            --secondary: #C0C0C0;
            --success: #00D9FF;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg-dark: #000000;
            --bg-card: #0A1628;
            --bg-light: #f8fafc;
            --text-light: #f1f5f9;
            --text-dark: #0A1628;
            --border: #00D9FF;
            --shadow: 0 10px 15px -3px rgba(0, 217, 255, 0.3);
            --glow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0A1628 100%);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 20px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-light);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark), #1e40af);
        }

        /* Sidebar */
        .sidebar {
            width: 400px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            margin-top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }

        .tab-navigation {
            display: flex;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 16px 8px;
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
            padding: 24px;
        }

        .tab-content.active {
            display: block;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-top: 70px;
            background: var(--bg-light);
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            height: 60px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            color: var(--text-dark);
        }

        .preview-content {
            flex: 1;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: auto;
            background: #f1f5f9;
        }

        .cv-preview {
            background: white;
            width: 210mm;
            min-height: 297mm;
            box-shadow: var(--shadow);
            padding: 40px;
            color: var(--text-dark);
            transform-origin: top center;
            transition: transform 0.3s ease;
        }

        /* Form Styles */
        .form-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* Photo Upload */
        .photo-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .photo-upload:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .photo-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
        }

        .photo-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--secondary);
        }

        /* Templates */
        .template-categories {
            margin-bottom: 20px;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-light);
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .template-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .template-card {
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .template-card.active {
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .template-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .template-preview-img {
            height: 60px;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            position: relative;
        }

        .template-info {
            padding: 8px;
        }

        .template-name {
            font-weight: 600;
            font-size: 11px;
            margin-bottom: 2px;
        }

        .template-desc {
            font-size: 9px;
            color: var(--secondary);
        }

        .template-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 7px;
            font-weight: 600;
        }

        /* Zoom Controls */
        .zoom-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #cbd5e1;
            background: white;
            color: var(--text-dark);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Experience Item */
        .experience-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 90px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 10000;
            font-weight: 500;
            box-shadow: var(--shadow);
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .alert.show {
            transform: translateX(0);
        }

        /* AI Chat */
        .ai-messages {
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .ai-message {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .ai-message.user {
            background: rgba(37, 99, 235, 0.1);
            text-align: right;
        }

        .ai-input-container {
            display: flex;
            gap: 8px;
        }

        .ai-input {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-light);
            font-size: 12px;
        }

        .ai-send-btn {
            padding: 8px 12px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-send-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* Typing indicator */
        .typing-indicator {
            display: inline-block;
            color: var(--primary);
        }

        .typing-indicator .dots {
            display: inline-block;
        }

        .typing-indicator .dots span {
            animation: blink 1.4s infinite;
            animation-fill-mode: both;
        }

        .typing-indicator .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0;
            }

            40% {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 50vh;
            }

            .cv-preview {
                width: 150mm;
                transform: scale(0.7);
            }
        }

        /* Animações */
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }

            10% {
                opacity: 1;
                transform: translateY(0);
            }

            90% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .saving-indicator {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <div class="logo-icon">
                <img src="nexthire-logo.png" alt="NextHire Logo" width="40" height="40" style="display: block;">
            </div>
            <div>NextHire</div>
        </div>
        <div class="header-actions">
            <button class="btn" onclick="analyzeCV()">
                <i class="fas fa-chart-line"></i> Analisar
            </button>
            <button class="btn" onclick="downloadPDF()">
                <i class="fas fa-download"></i> PDF
            </button>
            <button class="btn btn-primary" onclick="saveCV()" id="saveBtn">
                <i class="fas fa-save"></i> Salvar
            </button>
            <button class="btn" onclick="toggleTheme()" id="themeToggle" title="Alternar tema">
                <i class="fas fa-moon"></i>
            </button>
            <div id="userInfo"
                style="display: flex; align-items: center; gap: 12px; margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--border);">
                <!-- User info will be inserted here -->
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="tab-navigation">
                <button class="tab-btn active" onclick="switchTab('editor')">
                    <i class="fas fa-edit"></i>
                    <span>Editor</span>
                </button>
                <button class="tab-btn" onclick="switchTab('templates')">
                    <i class="fas fa-palette"></i>
                    <span>Templates</span>
                </button>
            </nav>

            <!-- Editor Tab -->
            <div class="tab-content active" id="tab-editor">
                <!-- Content will be populated by JavaScript -->
            </div>

            <!-- Templates Tab -->
            <div class="tab-content" id="tab-templates">
                <!-- Content will be populated by JavaScript -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="preview-header">
                <div style="font-weight: 600;">
                    <i class="fas fa-eye"></i> Pré-visualização do CV
                </div>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomOut()">
                        <i class="fas fa-minus"></i>
                    </button>
                    <span id="zoomLevel" style="margin: 0 8px; font-weight: 500;">100%</span>
                    <button class="zoom-btn" onclick="zoomIn()">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <div class="preview-content">
                <div class="cv-preview" id="cvPreview">
                    <!-- CV content will be generated by JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // Global State
        let currentTemplate = 'minimal-clean';
        let zoomLevel = 100;
        let currentCategory = 'todos';
        let userPhoto = null;
        let cvData = {
            personal: {},
            photo: null,
            summary: '',
            experience: [],
            skills: '',
            languages: ''
        };

        // Template Categories
        const templateCategories = {
            'todos': 'Todos',
            'profissional': 'Profissional',
            'criativo': 'Criativo',
            'tecnologia': 'Tecnologia',
            'executivo': 'Executivo'
        };

        // Templates Database - Apenas layouts únicos
        const templates = {
            // PROFISSIONAL - Layouts únicos
            'minimal-clean': {
                name: 'Minimal Clean',
                category: 'profissional',
                description: 'Design limpo padrão',
                color: '#2563eb',
                isPremium: false
            },
            'corporate-blue': {
                name: 'Corporate Blue',
                category: 'profissional',
                description: 'Layout corporativo',
                color: '#1e40af',
                isPremium: false
            },
            'business-gray': {
                name: 'Business Gray',
                category: 'profissional',
                description: 'Cards executivos',
                color: '#6b7280',
                isPremium: false
            },
            'modern-sidebar': {
                name: 'Modern Sidebar',
                category: 'profissional',
                description: 'Sidebar escura',
                color: '#0f172a',
                isPremium: false
            },
            'sidebar-professional': {
                name: 'Sidebar Professional',
                category: 'profissional',
                description: 'Sidebar cinza',
                color: '#475569',
                isPremium: false
            },
            'clean-minimal': {
                name: 'Clean Minimal',
                category: 'profissional',
                description: 'Minimalista centro',
                color: '#60A5FA',
                isPremium: false
            },

            // CRIATIVO - Layouts únicos
            'creative-gradient': {
                name: 'Creative Gradient',
                category: 'criativo',
                description: 'Gradiente vibrante',
                color: '#e91e63',
                isPremium: false
            },
            'turquoise-gradient': {
                name: 'Turquoise Gradient',
                category: 'criativo',
                description: 'Gradiente turquesa',
                color: '#5EEAD4',
                isPremium: false
            },

            // TECNOLOGIA - Layouts únicos
            'tech-dark': {
                name: 'Tech Dark',
                category: 'tecnologia',
                description: 'GitHub style',
                color: '#0d1117',
                isPremium: false
            },
            'dark-terminal': {
                name: 'Dark Terminal',
                category: 'tecnologia',
                description: 'Terminal code',
                color: '#1E293B',
                isPremium: false
            },

            // EXECUTIVO - Layouts únicos
            'executive-gold': {
                name: 'Executive Gold',
                category: 'executivo',
                description: 'Dourado luxo',
                color: '#d4af37',
                isPremium: false
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', function () {
            console.log('NextHire iniciado!');

            // Verificar autenticação
            requireAuth();

            // Mostrar informações do usuário
            const user = getCurrentUser();
            if (user) {
                document.getElementById('userInfo').innerHTML = `
                    <div onclick="window.location.href='profile.html'" style="display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 8px; border-radius: 8px; transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
                        <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #06b6d4); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;">
                            ${user.name.charAt(0).toUpperCase()}
                        </div>
                        <div style="display: flex; flex-direction: column;">
                            <span style="font-weight: 600; font-size: 13px;">${user.name}</span>
                            <span style="font-size: 11px; color: var(--secondary);">${user.email}</span>
                        </div>
                    </div>
                    <button class="btn" onclick="logout()" style="padding: 8px 16px; margin-left: 8px;">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                `;
            }

            initializeApp();

            // Verificar se há template selecionado do index
            const selectedTemplate = localStorage.getItem('selectedTemplate');
            if (selectedTemplate) {
                currentTemplate = selectedTemplate;
                localStorage.removeItem('selectedTemplate'); // Limpar após usar
                console.log('Template selecionado:', currentTemplate);
            }

            // Try to load saved data first, fallback to sample data
            const savedData = localStorage.getItem('nexthire-data');
            if (savedData) {
                loadSavedCV();
            } else {
                loadSampleData();
            }

            setupEventListeners();
            updatePreview();
            loadTheme(); // Carregar tema salvo

            // Atualizar seleção visual do template na galeria
            setTimeout(() => {
                const templateCard = document.querySelector(`.template-card[data-template="${currentTemplate}"]`);
                if (templateCard) {
                    document.querySelectorAll('.template-card').forEach(card => card.classList.remove('active'));
                    templateCard.classList.add('active');
                }
            }, 500);

            // Mostrar dica de atalhos
            setTimeout(() => {
                showAlert('💡 Dica: Use Ctrl+S para salvar e Ctrl+P para baixar PDF!');
            }, 2000);
        });

        function initializeApp() {
            createEditorTab();
            createTemplatesTab();
        }

        function createEditorTab() {
            const editorTab = document.getElementById('tab-editor');
            editorTab.innerHTML = `
                <!-- Photo Section -->
                <div class="form-section">
                    <h3><i class="fas fa-camera"></i> Foto do Perfil</h3>
                    <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
                        <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="handlePhotoUpload(event)">
                        <div id="photoPreview">
                            <div class="photo-placeholder">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-weight: 600; margin-bottom: 4px;">Adicionar Foto</div>
                            <div style="font-size: 12px; color: var(--secondary);">Clique para selecionar</div>
                        </div>
                    </div>
                </div>

                <!-- Personal Info -->
                <div class="form-section">
                    <h3><i class="fas fa-user"></i> Informações Pessoais</h3>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" class="form-control" id="fullName" placeholder="Seu nome completo">
                    </div>
                    <div class="form-group">
                        <label>Cargo/Profissão</label>
                        <input type="text" class="form-control" id="jobTitle" placeholder="Ex: Desenvolvedor Full Stack">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" id="email" placeholder="seu@email.com">
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="tel" class="form-control" id="phone" placeholder="(11) 99999-9999">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Cidade</label>
                            <input type="text" class="form-control" id="city" placeholder="São Paulo, SP">
                        </div>
                        <div class="form-group">
                            <label>LinkedIn</label>
                            <input type="url" class="form-control" id="linkedin" placeholder="linkedin.com/in/seuperfil">
                        </div>
                    </div>
                </div>

                <!-- Summary -->
                <div class="form-section">
                    <h3><i class="fas fa-file-text"></i> Resumo Profissional</h3>

        function adjustColor(color, amount) {
            if (color.startsWith('#')) {
                const num = parseInt(color.replace("#", ""), 16);
                const amt = Math.round(2.55 * amount);
                const R = (num >> 16) + amt;
                const G = (num >> 8 & 0x00FF) + amt;
                const B = (num & 0x0000FF) + amt;
                return "#" + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                    (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                    (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
            }
            return color;
        }

        function setupEventListeners() {
            const inputs = document.querySelectorAll('input, textarea');

                });

            // Atalhos de teclado

                // Ctrl+S ou Cmd+S = Salvar

                    e.preventDefault();
                    saveCV();

        async function askAI(question) {
            const messages = document.getElementById('aiMessages');

            // Adicionar mensagem do usuário
            messages.innerHTML += `
                <div class="ai-message user" style="background: rgba(0, 217, 255, 0.1); border-left: 3px solid var(--primary); margin-left: 20px;">
                    <strong>Você:</strong> ${question}
                </div>
            `;

            // Adicionar indicador de carregamento
            const loadingId = 'loading-' + Date.now();
            messages.innerHTML += `
                <div class="ai-message" id="${loadingId}">
                    🤖 <strong>NextHire Assistant:</strong><br>
                    <span class="typing-indicator">Pensando<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
                </div>
            `;
            messages.scrollTop = messages.scrollHeight;

            try {
                // Coletar contexto do CV
                collectData();
                const contextText = `
Dados do CV:
- Nome: ${cvData.personal.fullName || 'Não preenchido'}
- Cargo: ${cvData.personal.jobTitle || 'Não preenchido'}
- Resumo: ${cvData.summary || 'Não preenchido'}
- Habilidades: ${cvData.skills || 'Não preenchido'}
                `.trim();

                // Fazer requisição à API
                const response = await fetch('http://localhost:4000/api/ai', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'chat',
                        prompt: question,
                        context: contextText,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    throw new Error('Erro na API');
                }

                const data = await response.json();
                const answer = data.result || 'Desculpe, não consegui processar sua pergunta.';

                // Substituir loading pela resposta
                document.getElementById(loadingId).innerHTML = `
                    🤖 <strong>NextHire Assistant:</strong><br>
                    ${answer.replace(/\n/g, '<br>')}
                `;

            } catch (error) {
                console.error('Erro ao chamar IA:', error);
                document.getElementById(loadingId).innerHTML = `
                    🤖 <strong>NextHire Assistant:</strong><br>
                    ❌ Desculpe, ocorreu um erro ao processar sua pergunta. Verifique se o backend está rodando em http://localhost:4000
                `;
            }

            messages.scrollTop = messages.scrollHeight;
        }

        function generateKeywords() {
            const area = document.getElementById('aiArea').value;

            if (!area) {
                showAlert('⚠️ Selecione sua área primeiro!');

            }

            const keywordsByArea = {
                'tecnologia': 'Desenvolvimento, Programação, Full Stack, DevOps, Cloud, Agile, Scrum, API, Microserviços, CI/CD',
                'marketing': 'Digital, Performance, Growth, Inbound, Outbound, Conversão, ROI, Engajamento, Branding, Analytics',
                'design': 'UX, UI, Visual, Criativo, Interface, Experiência do Usuário, Prototipagem, Wireframe, Design System',
                'financas': 'Análise, Planejamento, Orçamento, Controladoria, Auditoria, Compliance, Gestão de Riscos, FP&A',
                'rh': 'Recrutamento, Seleção, Desenvolvimento, Treinamento, Gestão de Talentos, People Analytics, Cultura Organizacional',
                'engenharia': 'Projetos, Processos, Qualidade, Melhoria Contínua, Lean, Six Sigma, Gestão de Produção',
                'saude': 'Atendimento, Clínico, Hospitalar, Assistencial, Gestão em Saúde, Protocolos, Biossegurança',
                'educacao': 'Pedagógico, Didático, Metodologias, Ensino, Aprendizagem, Avaliação, Coordenação',
                'direito': 'Jurídico, Advocacia, Consultivo, Contencioso, Compliance, Contratos, Pareceres',
                'administracao': 'Gestão, Planejamento, Estratégia, Processos, Liderança, Projetos, Operações'
            };

            const keywords = keywordsByArea[area] || 'Gestão, Liderança, Estratégia, Inovação, Resultados';

            const messages = document.getElementById('aiMessages');
            messages.innerHTML += `

            messages.scrollTop = messages.scrollHeight;
        }


        function clearCV() {
            if (confirm('Tem certeza que deseja limpar todos os dados? Esta ação não pode ser desfeita.')) {
                // Clear localStorage
                localStorage.removeItem('procv-data');

                // Reset global state
                cvData = {
                    personal: {},
                    photo: null,
                    summary: '',
                    experience: [],
                    skills: '',
                    languages: ''
                };
                userPhoto = null;
                currentTemplate = 'minimal-clean';

                // Clear form fields
                document.querySelectorAll('input, textarea').forEach(field => {
                    field.value = '';
                });

                // Reset photo preview
                const preview = document.getElementById('photoPreview');
                preview.innerHTML = `
                    <div class="photo-placeholder">
                        <i class="fas fa-user"></i>
                    </div>
                `;

                // Clear experience container except first item
                const container = document.getElementById('experienceContainer');
                const items = container.querySelectorAll('.experience-item');
                for (let i = 1; i < items.length; i++) {
                    items[i].remove();
                }

                updatePreview();
                showAlert('🗑️ Dados limpos com sucesso!');
            }
        }

        function showAlert(message) {
            const alert = document.createElement('div');
            alert.className = 'alert';
            alert.style.whiteSpace = 'pre-line';
            alert.textContent = message;
            document.body.appendChild(alert);

            setTimeout(() => alert.classList.add('show'), 100);
            setTimeout(() => {
                alert.classList.remove('show');
                setTimeout(() => alert.remove(), 300);
            }, 5000);
        }
    </script>

        <img src="nexthire-logo.png" alt="Nexty" onerror="this.style.display='none'">
    </div>

    <!-- Nexty Chat Container -->
    <div class="nexty-chat-container" id="nextyChat">
        <div class="nexty-chat-header">
            <div>
                <h3>🤖 Nexty</h3>
                <small>Assistente IA NextHire</small>
            </div>
            <button class="nexty-close-btn" onclick="toggleChat()">×</button>
        </div>

        <div class="nexty-chat-messages" id="chatMessages">
            <div class="nexty-message ai">
                <div class="nexty-message-avatar">
                    <img src="nexthire-logo.png" alt="Nexty" onerror="this.innerHTML='N'">
                </div>
                <div class="nexty-message-content">
                    Olá! Sou a Nexty, sua assistente de IA. Como posso ajudar com seu currículo hoje?
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="sendQuickMessage('Melhorar resumo profissional')">✨ Melhorar Resumo</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Sugerir habilidades')">💡 Sugerir Skills</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Revisar gramática')">📝 Revisar Texto</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="nexty-chat-input">
            <input type="text" id="chatInput" placeholder="Digite sua mensagem..." onkeypress="handleChatKeyPress(event)">
            <button class="nexty-send-btn" id="sendBtn" onclick="sendChatMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Nexty Chat Integration
        const NEXTY_API_URL = 'http://localhost:4001/api/chat';
        let nextyConversationHistory = [];

        function toggleChat() {
            const chat = document.getElementById('nextyChat');
            chat.classList.toggle('active');
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        function sendQuickMessage(message) {
            document.getElementById('chatInput').value = message;
            sendChatMessage();
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            addChatMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            showChatTypingIndicator();
            
            // Add to conversation history
            nextyConversationHistory.push({
                role: 'user',
                content: message
            });
            
            try {
                const response = await fetch(NEXTY_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: nextyConversationHistory,
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Erro na API');
                }
                
                const data = await response.json();
                const aiResponse = data.result || 'Desculpe, não consegui processar sua mensagem.';
                
                // Remove typing indicator
                removeChatTypingIndicator();
                
                // Add AI response
                addChatMessage(aiResponse, 'ai');
                
                // Add to conversation history
                nextyConversationHistory.push({
                    role: 'assistant',
                    content: aiResponse
                });
                
            } catch (error) {
                console.error('Erro:', error);
                removeChatTypingIndicator();
                addChatMessage('Desculpe, ocorreu um erro. Verifique se o backend está rodando em http://localhost:4001', 'ai');
            }
        }

        function addChatMessage(text, type) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `nexty-message ${type}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'nexty-message-avatar';
            
            if (type === 'ai') {
                avatar.innerHTML = '<img src="nexthire-logo.png" alt="Nexty" onerror="this.parentElement.innerHTML=\'N\'">';
            } else {
                const user = getCurrentUser();
                avatar.textContent = user ? user.name.charAt(0).toUpperCase() : 'U';
            }
            
            const content = document.createElement('div');
            content.className = 'nexty-message-content';
            content.textContent = text;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showChatTypingIndicator() {
            const messagesContainer = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'nexty-message ai';
            typingDiv.id = 'typingIndicator';
            
            typingDiv.innerHTML = `
                <div class="nexty-message-avatar">
                    <img src="nexthire-logo.png" alt="Nexty" onerror="this.parentElement.innerHTML='N'">
                </div>
                <div class="nexty-message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeChatTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
    </script>
