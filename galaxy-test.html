<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Scenes - Teste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 40, 0.9);
            padding: 20px 30px;
            border-radius: 50px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 217, 255, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #00D9FF, #00BFFF);
            border: none;
            color: #000;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .scene-info {
            color: #00D9FF;
            font-size: 14px;
            font-weight: 600;
            min-width: 150px;
            text-align: center;
        }

        .title {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: 900;
            color: #00D9FF;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.8);
            letter-spacing: 0.1em;
            z-index: 1000;
        }

        .instructions {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    
    <div class="title">GALAXY SCENES</div>
    
    <div class="instructions">
        Clique no fundo para explosão de partículas • Mova o mouse para interagir
    </div>

    <div class="controls">
        <button class="btn" onclick="prevScene()">◀ Anterior</button>
        <div class="scene-info" id="sceneInfo">Cena 1/12</div>
        <button class="btn" onclick="nextScene()">Próxima ▶</button>
    </div>

    <script>
        // ============================================
        // GALAXY SCENES SYSTEM
        // ============================================

        (function() {
            'use strict';

            // Canvas Manager
            class CanvasManager {
                constructor(canvasId) {
                    this.canvas = document.getElementById(canvasId);
                    this.ctx = this.canvas.getContext('2d');
                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                }

                resize() {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                }

                clear() {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }
            }

            // Particle Class
            class Particle {
                constructor(x, y, config) {
                    this.x = x;
                    this.y = y;
                    this.baseX = x;
                    this.baseY = y;
                    this.vx = (Math.random() - 0.5) * config.speed;
                    this.vy = (Math.random() - 0.5) * config.speed;
                    this.size = Math.random() * config.maxSize + 1;
                    this.baseSize = this.size;
                    this.opacity = Math.random() * 0.5 + 0.5;
                    this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                    this.pulseSpeed = Math.random() * 0.02 + 0.01;
                    this.pulsePhase = Math.random() * Math.PI * 2;
                }

                update(mouseX, mouseY, config) {
                    // Movimento base
                    this.x += this.vx;
                    this.y += this.vy;

                    // Rotação suave
                    if (config.rotation) {
                        const centerX = window.innerWidth / 2;
                        const centerY = window.innerHeight / 2;
                        const angle = Math.atan2(this.y - centerY, this.x - centerX);
                        this.vx += Math.cos(angle + Math.PI / 2) * 0.01 * config.rotation;
                        this.vy += Math.sin(angle + Math.PI / 2) * 0.01 * config.rotation;
                    }

                    // Interação com mouse
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < config.mouseRadius) {
                        const force = (config.mouseRadius - dist) / config.mouseRadius;
                        this.vx -= (dx / dist) * force * config.mouseForce;
                        this.vy -= (dy / dist) * force * config.mouseForce;
                        this.size = this.baseSize * (1 + force * 0.5);
                        this.opacity = Math.min(1, this.opacity + force * 0.3);
                    } else {
                        this.size += (this.baseSize - this.size) * 0.1;
                        this.opacity += (0.7 - this.opacity) * 0.05;
                    }

                    // Pulso
                    this.pulsePhase += this.pulseSpeed;
                    const pulse = Math.sin(this.pulsePhase) * 0.2 + 1;
                    this.size = this.baseSize * pulse;

                    // Bordas
                    if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
                    if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;

                    // Fricção
                    this.vx *= 0.99;
                    this.vy *= 0.99;
                }

                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    
                    // Glow
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                    gradient.addColorStop(0, this.color);
                    gradient.addColorStop(0.5, this.color.replace('1)', '0.3)'));
                    gradient.addColorStop(1, 'rgba(0,0,0,0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fill();

                    // Core
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            }

            // Galaxy Scene
            class GalaxyScene {
                constructor(canvasMgr, config) {
                    this.canvasMgr = canvasMgr;
                    this.config = config;
                    this.particles = [];
                    this.mouseX = -9999;
                    this.mouseY = -9999;
                    this.isRunning = false;
                    this.clickPulse = { active: false, x: 0, y: 0, radius: 0 };
                    
                    this.initParticles();
                    this.setupEvents();
                }

                initParticles() {
                    const { count, distribution } = this.config;
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    const cx = w / 2;
                    const cy = h / 2;

                    for (let i = 0; i < count; i++) {
                        let x, y;

                        switch (distribution) {
                            case 'circular':
                                const angle = (i / count) * Math.PI * 2;
                                const radius = Math.random() * Math.min(w, h) * 0.4;
                                x = cx + Math.cos(angle) * radius;
                                y = cy + Math.sin(angle) * radius;
                                break;
                            
                            case 'spiral':
                                const spiralAngle = (i / count) * Math.PI * 6;
                                const spiralRadius = (i / count) * Math.min(w, h) * 0.4;
                                x = cx + Math.cos(spiralAngle) * spiralRadius;
                                y = cy + Math.sin(spiralAngle) * spiralRadius;
                                break;
                            
                            case 'centered':
                                const dist = Math.random() * Math.min(w, h) * 0.3;
                                const randAngle = Math.random() * Math.PI * 2;
                                x = cx + Math.cos(randAngle) * dist;
                                y = cy + Math.sin(randAngle) * dist;
                                break;
                            
                            default: // dispersed
                                x = Math.random() * w;
                                y = Math.random() * h;
                        }

                        this.particles.push(new Particle(x, y, this.config));
                    }
                }

                setupEvents() {
                    this.mouseMoveHandler = (e) => {
                        this.mouseX = e.clientX;
                        this.mouseY = e.clientY;
                    };

                    this.clickHandler = (e) => {
                        this.clickPulse = {
                            active: true,
                            x: e.clientX,
                            y: e.clientY,
                            radius: 0
                        };

                        // Explosão de partículas
                        this.particles.forEach(p => {
                            const dx = p.x - e.clientX;
                            const dy = p.y - e.clientY;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 200) {
                                const force = (200 - dist) / 200;
                                p.vx += (dx / dist) * force * 10;
                                p.vy += (dy / dist) * force * 10;
                            }
                        });
                    };

                    document.addEventListener('mousemove', this.mouseMoveHandler);
                    document.addEventListener('click', this.clickHandler);
                }

                start() {
                    this.isRunning = true;
                    this.animate();
                }

                stop() {
                    this.isRunning = false;
                    document.removeEventListener('mousemove', this.mouseMoveHandler);
                    document.removeEventListener('click', this.clickHandler);
                }

                animate() {
                    if (!this.isRunning) return;

                    const { ctx, canvas } = this.canvasMgr;

                    // Background gradient
                    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    gradient.addColorStop(0, this.config.bgGradient[0]);
                    gradient.addColorStop(0.5, this.config.bgGradient[1]);
                    gradient.addColorStop(1, this.config.bgGradient[2]);
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Update and draw particles
                    this.particles.forEach(p => {
                        p.update(this.mouseX, this.mouseY, this.config);
                        p.draw(ctx);
                    });

                    // Draw connections
                    if (this.config.connections) {
                        this.drawConnections(ctx);
                    }

                    // Click pulse effect
                    if (this.clickPulse.active) {
                        this.drawClickPulse(ctx);
                    }

                    requestAnimationFrame(() => this.animate());
                }

                drawConnections(ctx) {
                    ctx.save();
                    for (let i = 0; i < this.particles.length; i++) {
                        for (let j = i + 1; j < this.particles.length; j++) {
                            const p1 = this.particles[i];
                            const p2 = this.particles[j];
                            const dx = p1.x - p2.x;
                            const dy = p1.y - p2.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);

                            if (dist < this.config.connectionDist) {
                                const opacity = (1 - dist / this.config.connectionDist) * 0.3;
                                ctx.strokeStyle = `rgba(0, 217, 255, ${opacity})`;
                                ctx.lineWidth = this.config.lineWidth;
                                ctx.beginPath();
                                ctx.moveTo(p1.x, p1.y);
                                ctx.lineTo(p2.x, p2.y);
                                ctx.stroke();
                            }
                        }
                    }
                    ctx.restore();
                }

                drawClickPulse(ctx) {
                    const { x, y, radius } = this.clickPulse;
                    
                    ctx.save();
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                    gradient.addColorStop(0, 'rgba(0, 217, 255, 0.3)');
                    gradient.addColorStop(0.5, 'rgba(0, 191, 255, 0.15)');
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    this.clickPulse.radius += 8;
                    if (this.clickPulse.radius > 300) {
                        this.clickPulse.active = false;
                    }
                }

                fadeIn(duration) {
                    // Simple fade in effect
                    this.canvasMgr.canvas.style.opacity = '0';
                    setTimeout(() => {
                        this.canvasMgr.canvas.style.transition = `opacity ${duration}ms`;
                        this.canvasMgr.canvas.style.opacity = '1';
                    }, 50);
                }
            }

            // Scene Presets
            const presets = [
                {
                    name: "Violeta Profundo",
                    count: 150,
                    distribution: 'dispersed',
                    speed: 0.5,
                    maxSize: 3,
                    colors: ['rgba(138, 43, 226, 1)', 'rgba(75, 0, 130, 1)', 'rgba(148, 0, 211, 1)'],
                    bgGradient: ['#0a0020', '#1a0040', '#0a0020'],
                    mouseRadius: 150,
                    mouseForce: 0.5,
                    connections: true,
                    connectionDist: 120,
                    lineWidth: 1,
                    rotation: 0.1
                },
                {
                    name: "Ciano Elétrico",
                    count: 200,
                    distribution: 'circular',
                    speed: 0.8,
                    maxSize: 2.5,
                    colors: ['rgba(0, 217, 255, 1)', 'rgba(0, 191, 255, 1)', 'rgba(64, 224, 208, 1)'],
                    bgGradient: ['#001a2e', '#002a4a', '#001a2e'],
                    mouseRadius: 180,
                    mouseForce: 0.7,
                    connections: true,
                    connectionDist: 100,
                    lineWidth: 1.5,
                    rotation: -0.15
                },
                {
                    name: "Espiral Galáctica",
                    count: 250,
                    distribution: 'spiral',
                    speed: 0.4,
                    maxSize: 2,
                    colors: ['rgba(138, 43, 226, 1)', 'rgba(0, 217, 255, 1)', 'rgba(255, 255, 255, 1)'],
                    bgGradient: ['#0a001a', '#1a0030', '#0a001a'],
                    mouseRadius: 200,
                    mouseForce: 0.4,
                    connections: true,
                    connectionDist: 80,
                    lineWidth: 0.8,
                    rotation: 0.2
                },
                {
                    name: "Nebulosa Magenta",
                    count: 180,
                    distribution: 'centered',
                    speed: 0.3,
                    maxSize: 4,
                    colors: ['rgba(255, 0, 255, 1)', 'rgba(199, 21, 133, 1)', 'rgba(218, 112, 214, 1)'],
                    bgGradient: ['#1a0020', '#2a0040', '#1a0020'],
                    mouseRadius: 160,
                    mouseForce: 0.6,
                    connections: true,
                    connectionDist: 140,
                    lineWidth: 1.2,
                    rotation: 0
                },
                {
                    name: "Azul Profundo",
                    count: 220,
                    distribution: 'dispersed',
                    speed: 0.6,
                    maxSize: 2.8,
                    colors: ['rgba(0, 0, 255, 1)', 'rgba(30, 144, 255, 1)', 'rgba(65, 105, 225, 1)'],
                    bgGradient: ['#000a1a', '#001a3a', '#000a1a'],
                    mouseRadius: 170,
                    mouseForce: 0.5,
                    connections: true,
                    connectionDist: 110,
                    lineWidth: 1,
                    rotation: -0.1
                },
                {
                    name: "Constelação Densa",
                    count: 300,
                    distribution: 'circular',
                    speed: 0.35,
                    maxSize: 1.8,
                    colors: ['rgba(255, 255, 255, 1)', 'rgba(0, 217, 255, 1)', 'rgba(138, 43, 226, 1)'],
                    bgGradient: ['#050010', '#0a0025', '#050010'],
                    mouseRadius: 140,
                    mouseForce: 0.8,
                    connections: true,
                    connectionDist: 90,
                    lineWidth: 0.6,
                    rotation: 0.05
                },
                {
                    name: "Aurora Boreal",
                    count: 160,
                    distribution: 'dispersed',
                    speed: 0.7,
                    maxSize: 3.5,
                    colors: ['rgba(0, 255, 127, 1)', 'rgba(0, 217, 255, 1)', 'rgba(138, 43, 226, 1)'],
                    bgGradient: ['#001a0a', '#002a1a', '#001a0a'],
                    mouseRadius: 190,
                    mouseForce: 0.45,
                    connections: true,
                    connectionDist: 130,
                    lineWidth: 1.3,
                    rotation: 0.12
                },
                {
                    name: "Supernova",
                    count: 120,
                    distribution: 'centered',
                    speed: 1.2,
                    maxSize: 5,
                    colors: ['rgba(255, 215, 0, 1)', 'rgba(255, 140, 0, 1)', 'rgba(255, 69, 0, 1)'],
                    bgGradient: ['#1a0a00', '#2a1500', '#1a0a00'],
                    mouseRadius: 220,
                    mouseForce: 1,
                    connections: false,
                    connectionDist: 0,
                    lineWidth: 0,
                    rotation: 0.25
                },
                {
                    name: "Vazio Cósmico",
                    count: 80,
                    distribution: 'dispersed',
                    speed: 0.2,
                    maxSize: 2,
                    colors: ['rgba(100, 100, 150, 1)', 'rgba(80, 80, 120, 1)', 'rgba(120, 120, 180, 1)'],
                    bgGradient: ['#000000', '#0a0a15', '#000000'],
                    mouseRadius: 250,
                    mouseForce: 0.3,
                    connections: true,
                    connectionDist: 200,
                    lineWidth: 0.5,
                    rotation: 0
                },
                {
                    name: "Plasma Violeta",
                    count: 280,
                    distribution: 'spiral',
                    speed: 0.9,
                    maxSize: 2.2,
                    colors: ['rgba(138, 43, 226, 1)', 'rgba(148, 0, 211, 1)', 'rgba(186, 85, 211, 1)'],
                    bgGradient: ['#1a0030', '#2a0050', '#1a0030'],
                    mouseRadius: 160,
                    mouseForce: 0.65,
                    connections: true,
                    connectionDist: 95,
                    lineWidth: 1.1,
                    rotation: -0.18
                },
                {
                    name: "Cristal Ciano",
                    count: 240,
                    distribution: 'circular',
                    speed: 0.45,
                    maxSize: 3.2,
                    colors: ['rgba(0, 255, 255, 1)', 'rgba(0, 217, 255, 1)', 'rgba(64, 224, 208, 1)'],
                    bgGradient: ['#002030', '#003050', '#002030'],
                    mouseRadius: 175,
                    mouseForce: 0.55,
                    connections: true,
                    connectionDist: 105,
                    lineWidth: 1.4,
                    rotation: 0.08
                },
                {
                    name: "Infinito Estelar",
                    count: 350,
                    distribution: 'dispersed',
                    speed: 0.55,
                    maxSize: 1.5,
                    colors: ['rgba(255, 255, 255, 1)', 'rgba(200, 200, 255, 1)', 'rgba(150, 150, 255, 1)'],
                    bgGradient: ['#000510', '#000a20', '#000510'],
                    mouseRadius: 130,
                    mouseForce: 0.4,
                    connections: true,
                    connectionDist: 70,
                    lineWidth: 0.7,
                    rotation: 0.03
                }
            ];

            // Galaxy Loader
            class GalaxyLoader {
                constructor(opts = {}) {
                    this.canvasMgr = new CanvasManager(opts.canvasId || 'particles');
                    this.sceneIndex = 0;
                    this.current = null;
                    this.autoSwitch = opts.autoSwitch !== false;
                    this.switchInterval = opts.switchInterval || 10000;
                    this._isRunning = false;
                    this._autoTimer = null;
                }

                start() {
                    if (this._isRunning) return;
                    this._isRunning = true;
                    this.loadScene(this.sceneIndex);
                    if (this.autoSwitch) this._startAuto();
                }

                stop() {
                    if (!this._isRunning) return;
                    this._isRunning = false;
                    if (this.current) this.current.stop();
                    this.current = null;
                    if (this._autoTimer) {
                        clearInterval(this._autoTimer);
                        this._autoTimer = null;
                    }
                }

                _startAuto() {
                    this._autoTimer = setInterval(() => this.next(), this.switchInterval);
                }

                next() {
                    this.loadScene((this.sceneIndex + 1) % presets.length);
                }

                prev() {
                    this.loadScene((this.sceneIndex - 1 + presets.length) % presets.length);
                }

                loadScene(index) {
                    if (this.current) {
                        try { this.current.stop(); } catch (e) {}
                    }
                    
                    this.sceneIndex = index;
                    const preset = presets[index];
                    this.current = new GalaxyScene(this.canvasMgr, preset);
                    this.current.start();
                    this.current.fadeIn(700);

                    // Update UI
                    document.getElementById('sceneInfo').textContent = 
                        `${preset.name} (${index + 1}/12)`;
                }

                getPresets() {
                    return presets.map((p, i) => ({ i, name: p.name }));
                }
            }

            // Initialize
            window.galaxyLoader = new GalaxyLoader({
                canvasId: 'particles',
                autoSwitch: false,
                switchInterval: 10000
            });

            window.galaxyLoader.start();

            // Global controls
            window.nextScene = () => window.galaxyLoader.next();
            window.prevScene = () => window.galaxyLoader.prev();

        })();
    </script>
</body>
</html>
