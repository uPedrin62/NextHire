<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexty - Teste Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: #1F2937;
            border-right: 2px solid #00D9FF;
            flex-shrink: 0;
            padding: 20px;
        }

        .main-content {
            flex: 1;
            background: #0A1628;
            padding: 20px;
            overflow-y: auto;
        }

        h1 {
            color: #00D9FF;
            margin-bottom: 20px;
        }

        .test-box {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00D9FF;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>SIDEBAR</h1>
            <div class="test-box">Item 1</div>
            <div class="test-box">Item 2</div>
            <div class="test-box">Item 3</div>
        </div>
        
        <div class="main-content">
            <h1>CONTEÚDO PRINCIPAL</h1>
            <div class="test-box">Este é o conteúdo principal</div>
            <div class="test-box">A sidebar está à esquerda</div>
            <div class="test-box">O conteúdo está à direita</div>
        </div>
    </div>
</body>
</html>
