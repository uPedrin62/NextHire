<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - NextHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0A1628 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #00bfff;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
            margin-bottom: 10px;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 191, 255, 0.1);
            border: 2px solid #00bfff;
            border-radius: 8px;
            color: #00bfff;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .back-btn:hover {
            background: rgba(0, 191, 255, 0.2);
            transform: translateX(-5px);
        }
        
        .profile-card {
            background: rgba(26, 26, 46, 0.8);
            border: 2px solid #00bfff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.3);
        }
        
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00bfff, #00d9ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0 auto 30px;
            border: 4px solid #00bfff;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.5);
        }
        
        .profile-info {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .profile-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .profile-email {
            color: #aaa;
            font-size: 1.1rem;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid #00bfff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #00bfff;
            display: block;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: 2px solid #00bfff;
            border-radius: 8px;
            background: transparent;
            color: #00bfff;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #00bfff;
            color: #000;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .btn-danger:hover {
            background: #ef4444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Voltar
        </a>
        
        <div class="header">
            <h1>Meu Perfil</h1>
        </div>
        
        <div class="profile-card">
            <div class="profile-avatar" id="avatar">
                <i class="fas fa-user"></i>
            </div>
            
            <div class="profile-info">
                <div class="profile-name" id="userName">Usuário</div>
                <div class="profile-email" id="userEmail">email@exemplo.com</div>
            </div>
            
            <div class="profile-stats">
                <div class="stat-card">
                    <span class="stat-number" id="cvCount">0</span>
                    <span class="stat-label">Currículos Criados</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="templateCount">0</span>
                    <span class="stat-label">Templates Usados</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="downloadCount">0</span>
                    <span class="stat-label">Downloads</span>
                </div>
            </div>
            
            <div class="actions">
                <button class="btn" onclick="editProfile()">
                    <i class="fas fa-edit"></i>
                    Editar Perfil
                </button>
                <button class="btn" onclick="window.location.href='nexthire-editor-final-immersive.html'">
                    <i class="fas fa-file-alt"></i>
                    Meus Currículos
                </button>
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Sair
                </button>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script src="particles-interactive.js"></script>
    <script>
        // Carregar dados do usuário
        const user = getCurrentUser();
        
        if (user) {
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('avatar').innerHTML = user.name.charAt(0).toUpperCase();
            
            // Estatísticas (exemplo)
            const savedData = localStorage.getItem('nexthire-data');
            if (savedData) {
                document.getElementById('cvCount').textContent = '1';
            }
        } else {
            window.location.href = 'login-immersive.html';
        }
        
        function editProfile() {
            alert('Funcionalidade de edição em desenvolvimento!');
        }
        
        function logout() {
            if (confirm('Deseja realmente sair?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
