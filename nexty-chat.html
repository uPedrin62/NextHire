<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexty - Assistente IA Pessoal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0A1628 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(0, 191, 255, 0.3);
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #00bfff;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
            margin-bottom: 5px;
        }
        
        .header p {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        .chat-container {
            flex: 1;
            background: rgba(26, 26, 46, 0.6);
            border: 2px solid rgba(0, 191, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .message {
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: rgba(0, 191, 255, 0.2);
            border: 1px solid rgba(0, 191, 255, 0.5);
            margin-left: auto;
            text-align: right;
        }
        
        .message.nexty {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(0, 191, 255, 0.3);
        }
        
        .message-header {
            font-weight: 600;
            color: #00bfff;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .message-content {
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .typing-indicator {
            display: inline-block;
            color: #00bfff;
        }
        
        .typing-indicator span {
            animation: blink 1.4s infinite;
            animation-fill-mode: both;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            background: rgba(26, 26, 46, 0.6);
            border: 2px solid rgba(0, 191, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }
        
        .input-field {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 8px;
            padding: 12px 15px;
            color: #ffffff;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            max-height: 120px;
            min-height: 48px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #00bfff;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
        }
        
        .send-btn {
            background: linear-gradient(135deg, #00bfff, #00d9ff);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 191, 255, 0.5);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            padding: 8px 16px;
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 20px;
            color: #00bfff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-btn:hover {
            background: rgba(0, 191, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #00bfff;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #00bfff;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 191, 255, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 191, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nexty</h1>
            <p>Sua assistente de IA pessoal</p>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <i class="fas fa-robot"></i>
                <h2>Olá! Sou a Nexty</h2>
                <p>Como posso ajudar você hoje?</p>
            </div>
        </div>
        
        <div class="quick-actions" id="quickActions">
            <button class="quick-btn" onclick="sendQuickMessage('Me ajude a escrever um email profissional')">
                <i class="fas fa-envelope"></i> Email profissional
            </button>
            <button class="quick-btn" onclick="sendQuickMessage('Explique um conceito de programação')">
                <i class="fas fa-code"></i> Programação
            </button>
            <button class="quick-btn" onclick="sendQuickMessage('Me dê ideias criativas')">
                <i class="fas fa-lightbulb"></i> Ideias criativas
            </button>
            <button class="quick-btn" onclick="sendQuickMessage('Traduza um texto')">
                <i class="fas fa-language"></i> Tradução
            </button>
        </div>
        
        <div class="input-container">
            <textarea 
                class="input-field" 
                id="messageInput" 
                placeholder="Digite sua mensagem..."
                onkeydown="handleKeyPress(event)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
                Enviar
            </button>
        </div>
    </div>
    
    <script src="particles-interactive.js"></script>
    <script>
        let conversationHistory = [];
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Limpar empty state
            const chatContainer = document.getElementById('chatContainer');
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            // Adicionar mensagem do usuário
            addMessage(message, 'user');
            input.value = '';
            
            // Desabilitar botão
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            // Adicionar indicador de digitação
            const typingId = 'typing-' + Date.now();
            addTypingIndicator(typingId);
            
            // Simular resposta da IA (você pode integrar com uma API real aqui)
            setTimeout(() => {
                removeTypingIndicator(typingId);
                const response = generateResponse(message);
                addMessage(response, 'nexty');
                sendBtn.disabled = false;
            }, 1500);
        }
        
        function addMessage(content, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const header = sender === 'user' ? 'Você' : 'Nexty';
            
            messageDiv.innerHTML = `
                <div class="message-header">${header}</div>
                <div class="message-content">${content}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            conversationHistory.push({ sender, content });
        }
        
        function addTypingIndicator(id) {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = id;
            typingDiv.className = 'message nexty';
            typingDiv.innerHTML = `
                <div class="message-header">Nexty</div>
                <div class="message-content">
                    <span class="typing-indicator">
                        Pensando<span>.</span><span>.</span><span>.</span>
                    </span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function removeTypingIndicator(id) {
            const indicator = document.getElementById(id);
            if (indicator) indicator.remove();
        }
        
        function generateResponse(message) {
            // Respostas simuladas - você pode integrar com OpenAI API aqui
            const responses = {
                'oi': 'Olá! Como posso ajudar você hoje?',
                'olá': 'Oi! Em que posso ser útil?',
                'como você está': 'Estou ótima, obrigada por perguntar! E você?',
                'default': 'Entendi sua pergunta. Para ter respostas mais completas, você pode configurar a integração com a API da OpenAI no backend. Por enquanto, estou em modo de demonstração!'
            };
            
            const lowerMessage = message.toLowerCase();
            
            for (const [key, value] of Object.entries(responses)) {
                if (lowerMessage.includes(key)) {
                    return value;
                }
            }
            
            return responses.default;
        }
    </script>
</body>
</html>
